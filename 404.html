// ── Helpers ──
function getStatus(d){
  if(d.status==='paid')return 'paid';
  const diff=Math.floor((new Date()-new Date(d.due_date))/86400000);
  if(diff>0)return 'overdue';
  if(diff>-7)return 'due';
  return 'active';
}
const statusClass=s=>({active:'pill-active',due:'pill-due',overdue:'pill-overdue',paid:'pill-paid'}[s]??'');
const daysOverdue=d=>Math.max(0,Math.floor((new Date()-new Date(d.due_date))/86400000));
const fmt=n=>Number(n??0).toLocaleString('ru-RU',{maximumFractionDigits:2});
const todayStr=()=>new Date().toISOString().split('T')[0];

function getOverdueCat(days,t){
  if(days<=0)return null;
  if(days<=30)return{label:t.cat1,cls:'cat-1',order:1};
  if(days<=90)return{label:t.cat2,cls:'cat-2',order:2};
  if(days<=180)return{label:t.cat3,cls:'cat-3',order:3};
  if(days<=365)return{label:t.cat4,cls:'cat-4',order:4};
  return{label:t.cat5,cls:'cat-5',order:5};
}

function exportToExcel(debts,bizName,t){
  const rows=debts.map(d=>({
    [t.clientName]:d.client_name,[t.phone]:d.phone,
    [t.amount]:Number(d.amount),[t.paid]:Number(d.paid_amount??0),
    [t.remaining]:Number(d.amount)-Number(d.paid_amount??0),
    [t.dateIssued]:d.date_issued,[t.dueDate]:d.due_date,
    [t.days]:getStatus(d)==='overdue'?daysOverdue(d):0,
    [t.category]:d.category,[t.comment]:d.comment||''
  }));
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:24},{wch:18},{wch:14},{wch:12},{wch:12},{wch:14},{wch:14},{wch:10},{wch:16},{wch:24}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,t.debts);
  XLSX.writeFile(wb,`${bizName}_${t.debts}_${todayStr()}.xlsx`);
}

function AddDebtModal({business,onClose,onSaved,t}){
  const [f,setF]=useState({name:'',phone:'',amount:'',cat:t.cats[0],dateIssued:todayStr(),dueDate:'',comment:''});
  const [error,setError]=useState('');const [saving,setSaving]=useState(false);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  async function submit(e){
    e.preventDefault();setError('');
    if(!f.name.trim()){setError(t.clientName+'!');return;}
    if(!f.phone.trim()){setError(t.phone+'!');return;}
    if(!f.amount||+f.amount<=0){setError(t.amount+'!');return;}
    if(!f.dateIssued){setError(t.dateIssued+'!');return;}
    if(!f.dueDate){setError(t.dueDate+'!');return;}
    setSaving(true);
    const{error:err}=await sb.from('debts').insert({
      business_id:business.id,client_name:f.name.trim(),phone:f.phone.trim(),
      amount:+f.amount,date_issued:f.dateIssued,due_date:f.dueDate,
      category:f.cat,comment:f.comment.trim(),status:'active',paid_amount:0
    });
    setSaving(false);
    if(err){setError(err.message);return;}
    onSaved();onClose();
  }
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">

          </div>

          <select value={f.cat} onChange={e=>set('cat',e.target.value)}>{t.cats.map(c=><option key={c}>{c}</option>)}</select>

// ── Pay Modal ──
function PayModal({debt,onClose,onSaved,t}){
  const remaining=Number(debt.amount)-Number(debt.paid_amount??0);
  const [amount,setAmount]=useState(String(Math.round(remaining*100)/100));
  const [paidAt,setPaidAt]=useState(todayStr());
  const [method,setMethod]=useState(t.cash);
  const [note,setNote]=useState('');
  const [error,setError]=useState('');const [saving,setSaving]=useState(false);
  async function submit(e){
    e.preventDefault();setError('');
    const amt=Number(amount);
    if(!amt||amt<=0){setError(t.minPay);return;}
    if(amt>remaining+0.01){setError(t.maxPay+': '+fmt(remaining));return;}
    setSaving(true);
    await sb.from('payments').insert({debt_id:debt.id,amount:amt,paid_at:paidAt,method,note});
    const newPaid=Number(debt.paid_amount??0)+amt;
    const newStatus=newPaid>=Number(debt.amount)-0.01?'paid':'partial';
    await sb.from('debts').update({paid_amount:newPaid,status:newStatus}).eq('id',debt.id);
    setSaving(false);onSaved();
  }
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">
        <div className="modal-title">💳 {t.payTitle}</div>
        <div className="info-box" style={{marginTop:16}}>
          <div style={{fontWeight:700,fontSize:15}}>{debt.client_name}</div>
          <div style={{color:'var(--g500)',marginTop:4,fontSize:13,display:'flex',gap:12,flexWrap:'wrap'}}>
            <span>{t.totalDebt}: <strong>{fmt(debt.amount)}</strong> {t.sum}</span>
            <span>{t.remaining}: <strong style={{color:'var(--red)'}}>{fmt(remaining)}</strong> {t.sum}</span>
          </div>
        </div>
        <form onSubmit={submit}>
          <label>{t.payAmount} *</label>
          <input type="number" value={amount} onChange={e=>setAmount(e.target.value)} min="0.01" step="0.01" autoFocus/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div><label>{t.payDate}</label><input type="date" value={paidAt} onChange={e=>setPaidAt(e.target.value)}/></div>
            <div><label>{t.payMethod}</label>
              <select value={method} onChange={e=>setMethod(e.target.value)}>
                {[t.cash,t.transfer,t.card,t.other].map(m=><option key={m}>{m}</option>)}
              </select>
            </div>
          </div>
          <label>{t.payNote}</label>
          <input value={note} onChange={e=>setNote(e.target.value)}/>
          {error&&<div className="alert alert-error">{error}</div>}
          <div className="modal-footer">
            <button type="button" className="btn" onClick={onClose}>{t.cancel}</button>
            <button type="submit" className="btn btn-green" disabled={saving}>{saving?'...':t.confirmPay}</button>
          </div>
        </form>
      </div>
    </div>
  );
}

            ?<div style={{padding:'20px',color:'var(--g400)',fontSize:13,textAlign:'center'}}>{t.noDebts}</div>
            :<div className="chart-wrap">
              {catEntries.map(([cat,val])=>(
                <div key={cat} className="chart-bar-row">
                  <div className="chart-bar-label">{cat}</div>
                  <div className="chart-bar-track"><div className="chart-bar-fill" style={{width:`${Math.round(val/maxCat*100)}%`,background:'var(--primary)'}}/></div>
                  <div className="chart-bar-val">{fmt(val)} {t.sum}</div>
                </div>
              ))}
            </div>}
        </div>
        <div className="card">
          <div className="card-header">
            <div className="card-title">🕐 {t.recentDebts}</div>
            <button className="btn btn-sm" onClick={()=>setPage('debts')}>{t.seeAll}</button>
          </div>
          {loading?<div className="loading-wrap"><div className="spinner"/></div>
          :debts.length===0?<div className="empty-state" style={{padding:'32px'}}><div className="empty-icon" style={{fontSize:36}}>📋</div><div className="empty-title">{t.noDebts}</div></div>
          :<div style={{padding:'6px 0'}}>
            {debts.slice(0,5).map(d=>{
              const st=getStatus(d);const rem=Number(d.amount)-Number(d.paid_amount??0);
              return<div key={d.id} style={{display:'flex',alignItems:'center',padding:'10px 20px',borderBottom:'1px solid var(--border)'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.client_name}</div>
                  <div style={{fontSize:11,color:'var(--g400)',marginTop:1}}>{d.phone}</div>
                </div>
                <div style={{textAlign:'right',marginLeft:12,flexShrink:0}}>
                  <div style={{fontWeight:700,fontSize:13,color:rem>0?'var(--red)':'var(--green)'}}>{fmt(rem)} {t.sum}</div>
                  <div style={{marginTop:3}}>
                    <span className={`pill ${statusClass(st)}`} style={{fontSize:10}}>
                      <span className="pill-dot"/>
                      {st==='active'?t.active:st==='due'?t.dueSoon:st==='overdue'?t.overdue:t.paid}
                    </span>
                  </div>
                </div>
              </div>;
            })}
          </div>}
        </div>
      </div>
      {overdue.length>0&&(
        <div className="card">
          <div className="card-header">
            <div><div className="card-title">🔴 {t.overdueDebts}</div><div className="card-sub">{overdue.length}</div></div>
            <button className="btn btn-sm" onClick={()=>exportToExcel(overdue,business?.name+'_overdue',t)}>{t.exportExcel}</button>
          </div>
          <div className="table-wrap"><table>
            <thead><tr><th>{t.clientName}</th><th>{t.remaining}</th><th>{t.days}</th><th>{t.category}</th><th>{t.phone}</th><th></th></tr></thead>
            <tbody>{overdue.sort((a,b)=>daysOverdue(b)-daysOverdue(a)).map(d=>{
              const ov=daysOverdue(d);const cat=getOverdueCat(ov,t);const rem=Number(d.amount)-Number(d.paid_amount??0);
              return<tr key={d.id}>
                <td><div style={{fontWeight:600}}>{d.client_name}</div><div style={{fontSize:11,color:'var(--g400)'}}>{d.category}</div></td>
                <td style={{fontWeight:700,color:'var(--red)'}}>{fmt(rem)} {t.sum}</td>
                <td><strong style={{color:'var(--red)'}}>{ov} {t.days}</strong></td>
                <td>{cat&&<span className={`pill ${cat.cls}`}>{cat.label}</span>}</td>
                <td style={{color:'var(--g500)'}}>{d.phone}</td>
                <td><button className="btn btn-sm btn-green" onClick={()=>setPayDebt(d)}>💳 {t.confirmPay.replace('✓ ','')}</button></td>
              </tr>;
            })}</tbody>
          </table></div>
        </div>
      )}
      {addOpen&&<AddDebtModal business={business} onClose={()=>setAddOpen(false)} onSaved={()=>{load();toast(t.addedOk);}} t={t}/>}
      {payDebt&&<PayModal debt={payDebt} onClose={()=>setPayDebt(null)} onSaved={()=>{load();setPayDebt(null);toast(t.paidOk);}} t={t}/>}
    </>
  );
}

// ── Debts Page ──
function DebtsPage({t}){
  const {business}=useApp();
  const [debts,setDebts]=useState([]);const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');const [fStatus,setFStatus]=useState('');const [sort,setSort]=useState('date_desc');
  const [addOpen,setAddOpen]=useState(false);const [payDebt,setPayDebt]=useState(null);
  async function load(){
    if(!business)return;setLoading(true);
    const{data}=await sb.from('debts').select('*').eq('business_id',business.id).order('created_at',{ascending:false});
    setDebts(data??[]);setLoading(false);
  }
  useEffect(()=>{load();},[business]);
  async function del(d){
    if(!confirm(t.deleteConfirm))return;
    await sb.from('debts').delete().eq('id',d.id);
    toast(t.deletedOk,'error');load();
  }
  const list=useMemo(()=>{
    let r=debts.filter(d=>{
      const q=search.toLowerCase();
      return(!q||d.client_name.toLowerCase().includes(q)||d.phone.includes(q))&&(!fStatus||getStatus(d)===fStatus);
    });
    r.sort((a,b)=>{
      if(sort==='date_asc')return new Date(a.date_issued)-new Date(b.date_issued);
      if(sort==='amount_desc')return Number(b.amount)-Number(a.amount);
      if(sort==='overdue')return daysOverdue(b)-daysOverdue(a);
      return new Date(b.created_at)-new Date(a.created_at);
    });
    return r;
  },[debts,search,fStatus,sort]);
  return(
    <>
      <div className="page-header">
        <div><div className="page-title">{t.debts}</div><div className="page-sub">{list.length}</div></div>
        <div className="page-actions">
          <button className="btn" onClick={()=>exportToExcel(list,business?.name||'',t)}>{t.exportExcel}</button>
          <button className="btn btn-primary" onClick={()=>setAddOpen(true)}>{t.addDebt}</button>
        </div>
      </div>
      <div className="card">
        <div className="filter-bar">
          <input placeholder={'🔍 '+t.search} value={search} onChange={e=>setSearch(e.target.value)}/>
          <select value={fStatus} onChange={e=>setFStatus(e.target.value)}>
            <option value="">{t.allStatus}</option>
            <option value="active">{t.active}</option>
            <option value="due">{t.dueSoon}</option>
            <option value="overdue">{t.overdue}</option>
            <option value="paid">{t.paid}</option>
          </select>
          <select value={sort} onChange={e=>setSort(e.target.value)}>
            <option value="date_desc">{t.newest}</option>
            <option value="date_asc">{t.oldest}</option>
            <option value="amount_desc">{t.byAmount}</option>
            <option value="overdue">{t.byOverdue}</option>
          </select>
        </div>
        {loading?<div className="loading-wrap"><div className="spinner"/></div>
        :list.length===0?<div className="empty-state"><div className="empty-icon">📋</div><div className="empty-title">{t.noDebts}</div><div style={{fontSize:13}}>{t.addFirst}</div></div>
        :<div className="table-wrap"><table>
          <thead><tr><th>{t.clientName}</th><th>{t.phone}</th><th>{t.amount}</th><th>{t.paid}</th><th>{t.remaining}</th><th>{t.dateIssued}</th><th>{t.dueDate}</th><th>{t.overdue}</th><th></th></tr></thead>
          <tbody>{list.map(d=>{
            const st=getStatus(d);const pa=Number(d.paid_amount??0);const rem=Number(d.amount)-pa;
            const ov=daysOverdue(d);const cat=getOverdueCat(ov,t);
            return<tr key={d.id}>
              <td><div style={{fontWeight:600}}>{d.client_name}</div>{d.comment&&<div style={{fontSize:11,color:'var(--g400)'}}>{d.comment}</div>}</td>
              <td style={{color:'var(--g500)'}}>{d.phone}</td>
              <td style={{fontWeight:600}}>{fmt(d.amount)}</td>
              <td style={{color:'var(--g400)'}}>{pa>0?fmt(pa):'—'}</td>
              <td style={{fontWeight:700,color:rem>0?'var(--red)':'var(--g400)'}}>{fmt(rem)}</td>
              <td style={{fontSize:12,color:'var(--g500)'}}>{d.date_issued}</td>
              <td style={{fontSize:12,color:'var(--g500)'}}>{d.due_date}</td>
              <td>{st==='overdue'&&cat?<span className={`pill ${cat.cls}`}>{cat.label}</span>:<span style={{color:'var(--g300)'}}>—</span>}</td>
              <td><div className="row-actions">
                {st!=='paid'&&<button className="btn btn-sm btn-green" onClick={()=>setPayDebt(d)}>💳</button>}
                <button className="btn btn-sm btn-danger" onClick={()=>del(d)}>✕</button>
              </div></td>
            </tr>;
          })}</tbody>
        </table></div>}
      </div>
      {addOpen&&<AddDebtModal business={business} onClose={()=>setAddOpen(false)} onSaved={()=>{load();toast(t.addedOk);}} t={t}/>}
      {payDebt&&<PayModal debt={payDebt} onClose={()=>setPayDebt(null)} onSaved={()=>{load();setPayDebt(null);toast(t.paidOk);}} t={t}/>}
    </>
  );
}

// ── Clients ──
function ClientsPage({t}){
  const {business}=useApp();
  const [debts,setDebts]=useState([]);const [loading,setLoading]=useState(true);const [search,setSearch]=useState('');
  useEffect(()=>{
    if(!business)return;setLoading(true);
    sb.from('debts').select('*').eq('business_id',business.id).then(({data})=>{setDebts(data??[]);setLoading(false);});
  },[business]);
  const clients=useMemo(()=>{
    const map={};
    debts.forEach(d=>{if(!map[d.phone])map[d.phone]={name:d.client_name,phone:d.phone,debts:[]};map[d.phone].debts.push(d);});
    return Object.values(map).filter(c=>{const q=search.toLowerCase();return!q||c.name.toLowerCase().includes(q)||c.phone.includes(q);})
      .sort((a,b)=>b.debts.some(d=>getStatus(d)==='overdue')-a.debts.some(d=>getStatus(d)==='overdue'));
  },[debts,search]);
  return(
    <>
      <div className="page-header"><div><div className="page-title">{t.clients}</div><div className="page-sub">{clients.length}</div></div></div>
      <div className="card">
        <div className="filter-bar"><input placeholder={'🔍 '+t.search} value={search} onChange={e=>setSearch(e.target.value)}/></div>
        {loading?<div className="loading-wrap"><div className="spinner"/></div>
        :clients.length===0?<div className="empty-state"><div className="empty-icon">👥</div><div className="empty-title">{t.noDebts}</div></div>
        :<div className="table-wrap"><table>
          <thead><tr><th>{t.clientName}</th><th>{t.phone}</th><th>{t.debts}</th><th>{t.activeDebts}</th><th>{t.paidDebts}</th><th>{t.overdue}</th><th></th></tr></thead>
          <tbody>{clients.map(c=>{
            const active=c.debts.filter(d=>getStatus(d)!=='paid');
            const paidD=c.debts.filter(d=>getStatus(d)==='paid');
            const actSum=active.reduce((s,d)=>s+Number(d.amount)-Number(d.paid_amount??0),0);
            const paidSum=paidD.reduce((s,d)=>s+Number(d.amount),0);
            const hasOv=active.some(d=>getStatus(d)==='overdue');
            const maxOv=Math.max(0,...active.filter(d=>getStatus(d)==='overdue').map(d=>daysOverdue(d)));
            const cat=getOverdueCat(maxOv,t);
            const init=c.name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
            return<tr key={c.phone}>
              <td><div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:36,height:36,borderRadius:10,background:'linear-gradient(135deg,#EFF6FF,#F5F3FF)',color:'var(--primary)',fontSize:13,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,border:'1px solid var(--border)'}}>{init}</div>
                <strong>{c.name}</strong>
              </div></td>
              <td style={{color:'var(--g500)'}}>{c.phone}</td>
              <td>{c.debts.length}</td>
              <td style={{fontWeight:700,color:actSum>0?'var(--red)':'var(--g400)'}}>{fmt(actSum)} {t.sum}</td>
              <td style={{color:'var(--green)',fontWeight:600}}>{fmt(paidSum)} {t.sum}</td>
              <td>{maxOv>0&&cat?<span className={`pill ${cat.cls}`}>{maxOv} {t.days}</span>:<span style={{color:'var(--g300)'}}>—</span>}</td>
              <td><span className={`pill ${hasOv?'pill-overdue':active.length?'pill-active':'pill-paid'}`}><span className="pill-dot"/>{hasOv?t.overdue:active.length?t.active:t.paid}</span></td>
            </tr>;
          })}</tbody>
        </table></div>}
      </div>
    </>
  );
}

// ── Settings ──
function SettingsPage({t}){
  const {business,setBusiness,session}=useApp();
  const [name,setName]=useState('');const [type,setType]=useState('');const [saving,setSaving]=useState(false);
  useEffect(()=>{if(business){setName(business.name);setType(business.type);};},[business]);
  async function save(e){
    e.preventDefault();setSaving(true);
    const{data}=await sb.from('businesses').update({name,type}).eq('id',business.id).select().single();
    if(data){setBusiness(data);toast(t.savedOk);}
    setSaving(false);
  }
  return(
    <>
      <div className="page-header"><div><div className="page-title">{t.settingsTitle}</div></div></div>
      <div className="card" style={{maxWidth:500}}>
        <div className="card-header"><span className="card-title">{t.profileTitle}</span></div>
        <form onSubmit={save} style={{padding:24}}>
          <label>{t.email}</label><input value={session?.user?.email??''} disabled/>
          <label>{t.bizName}</label><input value={name} onChange={e=>setName(e.target.value)} required/>
          <label>{t.bizType}</label>
          <select value={type} onChange={e=>setType(e.target.value)}>{t.types.map(tp=><option key={tp}>{tp}</option>)}</select>
          <button className="btn btn-primary" type="submit" style={{marginTop:24}} disabled={saving}>{saving?'...':t.save}</button>
        </form>
      </div>
    </>
  );
}

// ── Sidebar ──
function Sidebar({page,setPage,lang,setLang,overdueCount,t}){
  const {session,business}=useApp();
  const email=session?.user?.email??'';
  const initials=(business?.name??email).slice(0,2).toUpperCase();
  const langs=[{k:'tg',l:'Тоҷ'},{k:'ru',l:'Рус'},{k:'uz',l:'Ўзб'},{k:'en',l:'Eng'}];
  const nav=[
    {id:'dashboard',icon:'📊',label:t.dashboard},
    {id:'debts',icon:'📋',label:t.debts,badge:overdueCount},
    {id:'clients',icon:'👥',label:t.clients},
    {id:'settings',icon:'⚙️',label:t.settingsTitle},
  ];
  return(
    <aside className="sidebar">
      <div className="sidebar-logo">
        <div className="logo-wrap">
          <div className="logo-icon"><LogoSVG size={28}/></div>
          <div>
            <div className="logo-name">{t.appName}</div>
            <div className="logo-tagline">{t.appSub}</div>
          </div>
        </div>
      </div>
      <div className="lang-switcher">
        {langs.map(l=><button key={l.k} className={`lang-btn${lang===l.k?' active':''}`} onClick={()=>setLang(l.k)}>{l.l}</button>)}
      </div>
      <nav className="nav">
        {nav.map(n=>(
          <button key={n.id} className={`nav-item${page===n.id?' active':''}`} onClick={()=>setPage(n.id)}>
            <div className="nav-iw">{n.icon}</div>
            <span>{n.label}</span>
            {n.badge>0&&<span className="nav-badge">{n.badge}</span>}
          </button>
        ))}
      </nav>
      <div className="sidebar-footer">
        <div className="user-row">
          <div className="user-av">{initials}</div>
          <div style={{flex:1,minWidth:0}}>
            <div className="user-name">{business?.name??'...'}</div>
            <div className="user-email">{email}</div>
          </div>
          <button className="logout-btn" onClick={()=>sb.auth.signOut()} title={t.logout}>↩</button>
        </div>
      </div>
    </aside>
  );
}

// ── App ──
const PAGES={dashboard:Dashboard,debts:DebtsPage,clients:ClientsPage,settings:SettingsPage};
function App(){
  const [session,setSession]=useState(undefined);
  const [business,setBusiness]=useState(null);
  const [page,setPage]=useState('dashboard');
  const [lang,setLang]=useState('tg');
  const [toastState,setToast]=useState(null);
  const [overdueCount,setOverdueCount]=useState(0);
  _toast=setToast;
  const t=T[lang];

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>setSession(session));
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>setSession(s));
    return()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if(!session){setBusiness(null);return;}
    sb.from('businesses').select('*').eq('owner_id',session.user.id).single().then(({data})=>setBusiness(data));
  },[session]);

  useEffect(()=>{
    if(!business)return;
    sb.from('debts').select('status,due_date').eq('business_id',business.id).neq('status','paid')
      .then(({data})=>setOverdueCount((data??[]).filter(d=>getStatus(d)==='overdue').length));
  },[business,page]);

  useEffect(()=>{
    if(!toastState)return;
    const t=setTimeout(()=>setToast(null),3200);
    return()=>clearTimeout(t);
  },[toastState]);

  if(session===undefined)return<div className="loading-wrap" style={{minHeight:'100vh'}}><div className="spinner"/></div>;
  if(!session)return<AuthPage lang={lang} setLang={setLang}/>;
  const Page=PAGES[page]??Dashboard;
  return(
    <AppCtx.Provider value={{session,business,setBusiness,setPage}}>
      <div className="layout">
        <Sidebar page={page} setPage={setPage} lang={lang} setLang={setLang} overdueCount={overdueCount} t={t}/>
        <div className="main"><div className="main-inner"><Page t={t}/></div></div>
      </div>
      {toastState&&(
        <div key={toastState.id} className={`toast toast-${toastState.type}`}>
          {toastState.type==='success'?'✅':'❌'} {toastState.msg}
        </div>
      )}
    </AppCtx.Provider>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Феҳрист — Учёт задолженностей</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#2563EB;--primary-d:#1D4ED8;--primary-bg:#EFF6FF;--primary-t:#1E40AF;
  --green:#059669;--green-bg:#ECFDF5;--green-t:#065F46;
  --red:#DC2626;--red-bg:#FEF2F2;--red-t:#7F1D1D;
  --amber:#D97706;--amber-bg:#FFFBEB;--amber-t:#78350F;
  --orange:#EA580C;--orange-bg:#FFF7ED;--orange-t:#7C2D12;
  --purple:#7C3AED;--purple-bg:#F5F3FF;--purple-t:#4C1D95;
  --pink:#DB2777;--pink-bg:#FDF2F8;--pink-t:#831843;
  --g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;--g300:#CBD5E1;--g400:#94A3B8;--g500:#64748B;--g600:#475569;--g700:#334155;--g800:#1E293B;--g900:#0F172A;
  --border:rgba(0,0,0,.07);--r:10px;--r-lg:14px;--r-xl:20px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 6px rgba(0,0,0,.05),0 2px 4px rgba(0,0,0,.03);
  --shadow-lg:0 10px 15px rgba(0,0,0,.08),0 4px 6px rgba(0,0,0,.04);
}
body{font-family:'Inter',-apple-system,sans-serif;font-size:14px;color:var(--g800);background:var(--g50);line-height:1.5;-webkit-font-smoothing:antialiased}

/* Inputs */
input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid var(--g200);border-radius:var(--r);font-size:14px;font-family:inherit;color:var(--g800);background:#fff;outline:none;transition:all .15s}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
input:disabled{background:var(--g100);color:var(--g400)}
label{display:block;font-size:12px;font-weight:600;color:var(--g500);margin-bottom:5px;margin-top:14px;text-transform:uppercase;letter-spacing:.04em}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:var(--r);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid var(--g200);background:#fff;color:var(--g700);transition:all .15s;white-space:nowrap;letter-spacing:.01em}
.btn:hover{background:var(--g100);border-color:var(--g300)}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 1px 2px rgba(37,99,235,.3)}
.btn-primary:hover{background:var(--primary-d);border-color:var(--primary-d)}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-green:hover{background:#047857;border-color:#047857}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-danger{color:var(--red);border-color:rgba(220,38,38,.2);background:var(--red-bg)}
.btn-full{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* Cards */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow)}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.card-title{font-size:15px;font-weight:700;color:var(--g800)}
.card-sub{font-size:12px;color:var(--g400);margin-top:1px}

/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.05em;text-align:left;padding:10px 20px;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--g50)}
td{padding:13px 20px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFBFF}

/* Pills */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;letter-spacing:.02em}
.pill-active{background:var(--green-bg);color:var(--green-t)}
.pill-due{background:var(--amber-bg);color:var(--amber-t)}
.pill-overdue{background:var(--red-bg);color:var(--red-t)}
.pill-paid{background:var(--g100);color:var(--g500)}
.pill-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}

/* Overdue categories */
.cat-1{background:#FEF9C3;color:#713F12}
.cat-2{background:#FFEDD5;color:#7C2D12}
.cat-3{background:#FEE2E2;color:#7F1D1D}
.cat-4{background:#F3E8FF;color:#4C1D95}
.cat-5{background:#FCE7F3;color:#831843}

/* Stat cards */
.stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:14px}
.stat-label{font-size:12px;color:var(--g400);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:800;line-height:1;color:var(--g900)}
.stat-sub{font-size:12px;color:var(--g400);margin-top:6px;font-weight:500}
.stat-accent{position:absolute;top:0;left:0;width:4px;height:100%;border-radius:var(--r-lg) 0 0 var(--r-lg)}

/* Alert */
.alert{padding:12px 16px;border-radius:var(--r);font-size:13px;margin-top:10px;font-weight:500}
.alert-error{background:var(--red-bg);color:var(--red-t);border:1px solid rgba(220,38,38,.15)}
.alert-success{background:var(--green-bg);color:var(--green-t);border:1px solid rgba(5,150,105,.15)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;backdrop-filter:blur(2px)}
.modal-box{background:#fff;border-radius:var(--r-xl);padding:28px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,.2)}
.modal-title{font-size:18px;font-weight:800;color:var(--g900);margin-bottom:2px}
.modal-sub{font-size:13px;color:var(--g400);margin-bottom:4px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}

/* Layout */
.layout{display:flex;min-height:100vh}
.sidebar{width:256px;flex-shrink:0;background:var(--g900);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.logo-wrap{display:flex;align-items:center;gap:12px}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,#2563EB,#7C3AED);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 12px rgba(37,99,235,.4)}
.logo-name{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.02em}
.logo-tagline{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px}

.nav{padding:12px 0;flex:1}
.nav-section{padding:16px 20px 6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.25)}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;font-weight:500;color:rgba(255,255,255,.55);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all .12s;border-radius:0}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nav-item.active{background:rgba(37,99,235,.25);color:#fff;font-weight:600}
.nav-item.active .nav-icon-wrap{background:var(--primary)}
.nav-icon-wrap{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;transition:all .12s}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px}

.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08)}
.user-row{display:flex;align-items:center;gap:10px}
.user-avatar{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#2563EB,#7C3AED);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.user-name{font-size:13px;font-weight:600;color:#fff;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-email{font-size:11px;color:rgba(255,255,255,.4)}
.logout-btn{background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.5);cursor:pointer;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .12s;flex-shrink:0}
.logout-btn:hover{background:rgba(255,255,255,.15);color:#fff}

.main{flex:1;min-width:0;overflow-y:auto}
.main-inner{padding:28px;max-width:1200px}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:12px}
.page-title{font-size:24px;font-weight:800;color:var(--g900);letter-spacing:-.02em}
.page-sub{font-size:13px;color:var(--g400);margin-top:3px;font-weight:500}
.page-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:28px}

/* Loading */
.spinner{width:32px;height:32px;border:3px solid var(--g200);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-wrap{display:flex;align-items:center;justify-content:center;min-height:200px;flex-direction:column;gap:12px;color:var(--g400);font-size:13px}

/* Empty */
.empty-state{text-align:center;padding:56px 20px;color:var(--g400)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.6}
.empty-title{font-size:16px;font-weight:700;color:var(--g600);margin-bottom:6px}
.empty-sub{font-size:13px}

/* Filter bar */
.filter-bar{display:flex;gap:8px;padding:14px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--g50)}
.filter-bar input{flex:1;min-width:180px}
.filter-bar select{width:auto;min-width:140px}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:14px 20px;border-radius:var(--r-lg);font-size:13px;font-weight:600;z-index:9999;max-width:340px;box-shadow:var(--shadow-lg);color:#fff;display:flex;align-items:center;gap:10px}
.toast-success{background:var(--green)}
.toast-error{background:var(--red)}

/* Auth */
.auth-page{min-height:100vh;display:flex;background:var(--g900)}
.auth-left{flex:1;display:flex;align-items:center;justify-content:center;padding:40px;position:relative;overflow:hidden}
.auth-left::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(37,99,235,.15),rgba(124,58,237,.15))}
.auth-brand{position:relative;z-index:1;text-align:center}
.auth-brand-icon{width:80px;height:80px;background:linear-gradient(135deg,#2563EB,#7C3AED);border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 20px 40px rgba(37,99,235,.3)}
.auth-brand-name{font-size:32px;font-weight:800;color:#fff;letter-spacing:-.03em}
.auth-brand-sub{font-size:15px;color:rgba(255,255,255,.5);margin-top:8px}
.auth-features{margin-top:40px;display:flex;flex-direction:column;gap:16px;text-align:left;max-width:280px;margin-left:auto;margin-right:auto}
.auth-feature{display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.7);font-size:14px}
.auth-feature-icon{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.auth-right{width:480px;background:#fff;display:flex;align-items:center;justify-content:center;padding:40px}
.auth-card{width:100%;max-width:380px}
.auth-title{font-size:26px;font-weight:800;color:var(--g900);margin-bottom:4px;letter-spacing:-.02em}
.auth-sub{font-size:14px;color:var(--g400);margin-bottom:28px;font-weight:500}
.auth-switch{text-align:center;margin-top:20px;font-size:13px;color:var(--g400)}
.auth-switch button{background:none;border:none;color:var(--primary);cursor:pointer;font-weight:600;padding:0}
.auth-switch button:hover{text-decoration:underline}

.row-actions{display:flex;gap:4px}
.info-box{background:var(--g50);border-radius:var(--r);padding:14px 16px;font-size:13px;margin-top:12px;border:1px solid var(--border)}

/* Chart bars */
.chart-wrap{padding:20px}
.chart-bar-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.chart-bar-label{font-size:12px;color:var(--g500);font-weight:600;width:120px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chart-bar-track{flex:1;height:10px;background:var(--g100);border-radius:100px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:100px;transition:width .6s ease}
.chart-bar-val{font-size:12px;color:var(--g700);font-weight:600;width:100px;text-align:right;flex-shrink:0}

/* Overdue grid */
.overdue-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding:20px}
.overdue-card{border-radius:var(--r);padding:16px;text-align:center}
.overdue-card-num{font-size:28px;font-weight:800;line-height:1}
.overdue-card-label{font-size:11px;font-weight:600;margin-top:4px;opacity:.8}
.overdue-card-sum{font-size:12px;margin-top:6px;opacity:.7}

@media(max-width:768px){
  .auth-left{display:none}
  .auth-right{width:100%}
  .sidebar{width:200px}
  .stats-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { createClient } = supabase;
const sb = createClient(
  'https://fortxhggcnvbhrapkaul.supabase.co',
  'sb_publishable_wpL9aGzMTm4GdKyv9TUe5A_UMmkQAqq'
);
const { useState, useEffect, useMemo, createContext, useContext } = React;
const AppCtx = createContext(null);
const useApp = () => useContext(AppCtx);

let _toast = null;
function toast(msg, type='success') { _toast?.({msg,type,id:Date.now()}); }

function getStatus(d) {
  if (d.status==='paid') return 'paid';
  const diff = Math.floor((new Date()-new Date(d.due_date))/86400000);
  if (diff>0) return 'overdue';
  if (diff>-7) return 'due';
  return 'active';
}
const statusLabel = s => ({active:'Активный',due:'Скоро срок',overdue:'Просрочен',paid:'Оплачен'}[s]??s);
const statusClass = s => ({active:'pill-active',due:'pill-due',overdue:'pill-overdue',paid:'pill-paid'}[s]??'');
const daysOverdue = d => Math.max(0,Math.floor((new Date()-new Date(d.due_date))/86400000));
const fmt = n => Number(n??0).toLocaleString('ru-RU',{maximumFractionDigits:2});
const today = () => new Date().toISOString().split('T')[0];
const addDays = n => { const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().split('T')[0]; };

function getOverdueCat(days) {
  if (days<=0) return null;
  if (days<=30)  return {label:'До 30 дней',cls:'cat-1',order:1};
  if (days<=90)  return {label:'30–90 дней',cls:'cat-2',order:2};
  if (days<=180) return {label:'90–180 дней',cls:'cat-3',order:3};
  if (days<=365) return {label:'180–365 дней',cls:'cat-4',order:4};
  return {label:'Более 365 дней',cls:'cat-5',order:5};
}

// ── Excel Export ──
function exportToExcel(debts, bizName) {
  const rows = debts.map(d => ({
    'ФИО клиента': d.client_name,
    'Телефон': d.phone,
    'Сумма (сомони)': Number(d.amount),
    'Оплачено': Number(d.paid_amount??0),
    'Остаток': Number(d.amount)-Number(d.paid_amount??0),
    'Дата долга': d.date_issued,
    'Срок оплаты': d.due_date,
    'Дней просрочки': getStatus(d)==='overdue'?daysOverdue(d):0,
    'Категория': d.category,
    'Статус': statusLabel(getStatus(d)),
    'Комментарий': d.comment||''
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:22},{wch:18},{wch:14},{wch:12},{wch:12},{wch:14},{wch:14},{wch:16},{wch:14},{wch:12},{wch:24}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Долги');
  XLSX.writeFile(wb, `${bizName}_долги_${today()}.xlsx`);
}

// ── Logo SVG ──
const LogoIcon = ({size=36}) => (
  <svg width={size} height={size} viewBox="0 0 36 36" fill="none">
    <rect width="36" height="36" rx="10" fill="url(#lg)"/>
    <defs><linearGradient id="lg" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse"><stop stopColor="#2563EB"/><stop offset="1" stopColor="#7C3AED"/></linearGradient></defs>
    <path d="M10 13h16M10 18h10M10 23h13" stroke="white" strokeWidth="2.5" strokeLinecap="round"/>
    <circle cx="26" cy="23" r="4" fill="white" fillOpacity=".25" stroke="white" strokeWidth="1.5"/>
    <path d="M24.5 23l1 1 2-2" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>
);

// ── Auth ──
function AuthPage() {
  const [mode,setMode]=useState('login');
  return mode==='login'?<Login onSwitch={()=>setMode('register')}/>:<Register onSwitch={()=>setMode('login')}/>;
}

const features=[
  {icon:'📊','text':'Дашборд с графиками и аналитикой'},
  {icon:'⚠️','text':'Классификация просрочки по срокам'},
  {icon:'📥','text':'Экспорт в Excel одним нажатием'},
  {icon:'🔒','text':'Ваши данные видны только вам'},
];

function AuthLayout({children}) {
  return (
    <div className="auth-page">
      <div className="auth-left">
        <div className="auth-brand">
          <div className="auth-brand-icon"><LogoIcon size={44}/></div>
          <div className="auth-brand-name">Феҳрист</div>
          <div className="auth-brand-sub">Учёт дебиторской задолженности</div>
          <div className="auth-features">
            {features.map((f,i)=>(
              <div key={i} className="auth-feature">
                <div className="auth-feature-icon">{f.icon}</div>
                <span>{f.text}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div className="auth-right">{children}</div>
    </div>
  );
}

function Login({onSwitch}) {
  const [email,setEmail]=useState('');const [pass,setPass]=useState('');
  const [error,setError]=useState('');const [loading,setLoading]=useState(false);
  async function submit(e){
    e.preventDefault();setError('');setLoading(true);
    const {error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error)setError('Неверный email или пароль');
    setLoading(false);
  }
  return (
    <AuthLayout>
      <div className="auth-card">
        <div className="auth-title">Добро пожаловать</div>
        <div className="auth-sub">Войдите в свой аккаунт</div>
        <form onSubmit={submit}>
          <label>Email</label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" required autoFocus/>
          <label>Пароль</label>
          <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" required/>
          {error&&<div className="alert alert-error">⚠️ {error}</div>}
          <button className="btn btn-primary btn-full" type="submit" style={{marginTop:20,padding:'11px 18px',fontSize:14}} disabled={loading}>
            {loading?'Входим...':'Войти в систему'}
          </button>
        </form>
        <div className="auth-switch">Нет аккаунта? <button onClick={onSwitch}>Зарегистрироваться бесплатно</button></div>
      </div>
    </AuthLayout>
  );
}

function Register({onSwitch}) {
  const [bizName,setBizName]=useState('');const [bizType,setBizType]=useState('Другое');
  const [email,setEmail]=useState('');const [pass,setPass]=useState('');
  const [error,setError]=useState('');const [loading,setLoading]=useState(false);const [done,setDone]=useState(false);
  const types=['Аптека','Продуктовый магазин','Строительный магазин','Магазин одежды','Ресторан / кафе','Другое'];
  async function submit(e){
    e.preventDefault();setError('');setLoading(true);
    if(pass.length<6){setError('Пароль минимум 6 символов');setLoading(false);return;}
    const {error}=await sb.auth.signUp({email,password:pass,options:{data:{biz_name:bizName.trim(),biz_type:bizType}}});
    if(error)setError(error.message);else setDone(true);
    setLoading(false);
  }
  if(done) return (
    <AuthLayout>
      <div className="auth-card" style={{textAlign:'center'}}>
        <div style={{fontSize:56,margin:'0 0 16px'}}>✅</div>
        <div className="auth-title">Аккаунт создан!</div>
        <div className="auth-sub">Проверьте email <strong>{email}</strong> и нажмите ссылку подтверждения.</div>
        <button className="btn btn-primary btn-full" style={{marginTop:24}} onClick={onSwitch}>Войти</button>
      </div>
    </AuthLayout>
  );
  return (
    <AuthLayout>
      <div className="auth-card">
        <div className="auth-title">Регистрация</div>
        <div className="auth-sub">Создайте аккаунт — это бесплатно</div>
        <form onSubmit={submit}>
          <label>Название бизнеса *</label>
          <input value={bizName} onChange={e=>setBizName(e.target.value)} placeholder="Аптека Шифо / Магазин Азия" required autoFocus/>
          <label>Тип бизнеса</label>
          <select value={bizType} onChange={e=>setBizType(e.target.value)}>{types.map(t=><option key={t}>{t}</option>)}</select>
          <label>Email *</label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" required/>
          <label>Пароль *</label>
          <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Минимум 6 символов" required/>
          {error&&<div className="alert alert-error">⚠️ {error}</div>}
          <button className="btn btn-primary btn-full" type="submit" style={{marginTop:20,padding:'11px 18px',fontSize:14}} disabled={loading}>
            {loading?'Создаём...':'Создать аккаунт'}
          </button>
        </form>
        <div className="auth-switch">Уже есть аккаунт? <button onClick={onSwitch}>Войти</button></div>
      </div>
    </AuthLayout>
  );
}

// ── Modals ──
function AddDebtModal({business,onClose,onSaved}) {
  const CATS=['Лекарства','Продукты','Стройматериалы','Одежда','Другое'];
  const [f,setF]=useState({name:'',phone:'',amount:'',cat:'Другое',date:today(),days:'30',comment:''});
  const [error,setError]=useState('');const [saving,setSaving]=useState(false);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  async function submit(e){
    e.preventDefault();setError('');
    if(!f.name.trim()){setError('Введите ФИО клиента');return;}
    if(!f.phone.trim()){setError('Введите номер телефона');return;}
    if(!f.amount||+f.amount<=0){setError('Введите корректную сумму');return;}
    setSaving(true);
    const {error:err}=await sb.from('debts').insert({
      business_id:business.id,client_name:f.name.trim(),phone:f.phone.trim(),
      amount:+f.amount,date_issued:f.date,due_date:addDays(+f.days||30),
      category:f.cat,comment:f.comment.trim(),status:'active',paid_amount:0
    });
    setSaving(false);
    if(err){setError(err.message);return;}
    onSaved();onClose();
  }
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">
        <div className="modal-title">➕ Добавить долг</div>
        <div className="modal-sub">Заполните данные клиента</div>
        <form onSubmit={submit}>
          <label>ФИО клиента *</label><input value={f.name} onChange={e=>set('name',e.target.value)} placeholder="Рустам Алиев" autoFocus/>
          <label>Номер телефона *</label><input value={f.phone} onChange={e=>set('phone',e.target.value)} placeholder="+992 XX XXX XXXX"/>
          <label>Сумма долга (сомони) *</label><input type="number" value={f.amount} onChange={e=>set('amount',e.target.value)} placeholder="0" min="1" step="0.01"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div><label>Дата долга</label><input type="date" value={f.date} onChange={e=>set('date',e.target.value)}/></div>
            <div><label>Срок (дней)</label><input type="number" value={f.days} onChange={e=>set('days',e.target.value)} min="1" max="365"/></div>
          </div>
          <label>Категория</label>
          <select value={f.cat} onChange={e=>set('cat',e.target.value)}>{CATS.map(c=><option key={c}>{c}</option>)}</select>
          <label>Комментарий</label>
          <textarea value={f.comment} onChange={e=>set('comment',e.target.value)} rows={2} placeholder="Необязательно..."/>
          {error&&<div className="alert alert-error">{error}</div>}
          <div className="modal-footer">
            <button type="button" className="btn" onClick={onClose}>Отмена</button>
            <button type="submit" className="btn btn-primary" disabled={saving}>{saving?'Сохраняем...':'Добавить долг'}</button>
          </div>
        </form>
      </div>
    </div>
  );
}

function PayModal({debt,onClose,onSaved}) {
  const remaining=Number(debt.amount)-Number(debt.paid_amount??0);
  const [amount,setAmount]=useState(String(remaining));
  const [paidAt,setPaidAt]=useState(today());
  const [method,setMethod]=useState('Наличные');
  const [note,setNote]=useState('');
  const [error,setError]=useState('');const [saving,setSaving]=useState(false);
  async function submit(e){
    e.preventDefault();setError('');
    const amt=Number(amount);
    if(!amt||amt<=0){setError('Введите сумму');return;}
    if(amt>remaining+0.01){setError(`Максимум ${fmt(remaining)} сомони`);return;}
    setSaving(true);
    await sb.from('payments').insert({debt_id:debt.id,amount:amt,paid_at:paidAt,method,note});
    const newPaid=Number(debt.paid_amount??0)+amt;
    const newStatus=newPaid>=Number(debt.amount)-0.01?'paid':'partial';
    await sb.from('debts').update({paid_amount:newPaid,status:newStatus}).eq('id',debt.id);
    setSaving(false);onSaved();
  }
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">
        <div className="modal-title">💰 Записать оплату</div>
        <div className="info-box" style={{marginTop:16}}>
          <div style={{fontWeight:700,fontSize:15}}>{debt.client_name}</div>
          <div style={{color:'var(--g500)',marginTop:4,fontSize:13}}>
            Общий долг: <strong>{fmt(debt.amount)}</strong> сомони &nbsp;·&nbsp;
            Остаток: <strong style={{color:'var(--red)'}}>{fmt(remaining)}</strong> сомони
          </div>
        </div>
        <form onSubmit={submit}>
          <label>Сумма оплаты *</label>
          <input type="number" value={amount} onChange={e=>setAmount(e.target.value)} min="0.01" max={remaining} step="0.01" autoFocus/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div><label>Дата оплаты</label><input type="date" value={paidAt} onChange={e=>setPaidAt(e.target.value)}/></div>
            <div><label>Способ оплаты</label>
              <select value={method} onChange={e=>setMethod(e.target.value)}>
                {['Наличные','Перевод','Карта','Другое'].map(m=><option key={m}>{m}</option>)}
              </select>
            </div>
          </div>
          <label>Заметка</label>
          <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Необязательно"/>
          {error&&<div className="alert alert-error">{error}</div>}
          <div className="modal-footer">
            <button type="button" className="btn" onClick={onClose}>Отмена</button>
            <button type="submit" className="btn btn-green" disabled={saving}>{saving?'Сохраняем...':'✓ Подтвердить оплату'}</button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ── Dashboard ──
function Dashboard() {
  const {business,setPage}=useApp();
  const [debts,setDebts]=useState([]);const [loading,setLoading]=useState(true);
  const [addOpen,setAddOpen]=useState(false);const [payDebt,setPayDebt]=useState(null);
  async function load(){
    if(!business)return;setLoading(true);
    const {data}=await sb.from('debts').select('*').eq('business_id',business.id).order('created_at',{ascending:false});
    setDebts(data??[]);setLoading(false);
  }
  useEffect(()=>{load();},[business]);

  const active=debts.filter(d=>getStatus(d)!=='paid');
  const overdue=debts.filter(d=>getStatus(d)==='overdue');
  const paid=debts.filter(d=>getStatus(d)==='paid');
  const totalActive=active.reduce((s,d)=>s+Number(d.amount)-Number(d.paid_amount??0),0);
  const totalOverdue=overdue.reduce((s,d)=>s+Number(d.amount)-Number(d.paid_amount??0),0);
  const totalPaid=paid.reduce((s,d)=>s+Number(d.amount),0);
  const clients=new Set(active.map(d=>d.phone)).size;

  // Overdue categories
  const overdueCategories=[
    {label:'До 30 дней',days:[1,30],cls:'cat-1',color:'#CA8A04'},
    {label:'30–90 дней',days:[31,90],cls:'cat-2',color:'#EA580C'},
    {label:'90–180 дней',days:[91,180],cls:'cat-3',color:'#DC2626'},
    {label:'180–365 дней',days:[181,365],cls:'cat-4',color:'#7C3AED'},
    {label:'Более 365 дней',days:[366,99999],cls:'cat-5',color:'#DB2777'},
  ].map(cat=>{
    const items=overdue.filter(d=>{const ov=daysOverdue(d);return ov>=cat.days[0]&&ov<=cat.days[1];});
    return {...cat,count:items.length,sum:items.reduce((s,d)=>s+Number(d.amount)-Number(d.paid_amount??0),0)};
  });

  // Category chart
  const cats={};
  active.forEach(d=>{cats[d.category]=(cats[d.category]||0)+Number(d.amount)-Number(d.paid_amount??0);});
  const catEntries=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const maxCat=Math.max(1,...catEntries.map(e=>e[1]));

  return (
    <>
      <div className="page-header">
        <div>
          <div className="page-title">Дашборд</div>
          <div className="page-sub">Обзор задолженностей · {business?.name}</div>
        </div>
        <div className="page-actions">
          <button className="btn" onClick={()=>exportToExcel(debts,business?.name||'бизнес')}>📥 Экспорт Excel</button>
          <button className="btn btn-primary" onClick={()=>setAddOpen(true)}>+ Добавить долг</button>
        </div>
      </div>

      {/* Stats */}
      <div className="stats-grid">
        <div className="stat-card">
          <div className="stat-accent" style={{background:'var(--primary)'}}/>
          <div className="stat-icon" style={{background:'var(--primary-bg)'}}><span>📋</span></div>
          <div className="stat-label">Активных долгов</div>
          <div className="stat-value" style={{color:'var(--primary)'}}>{active.length}</div>
          <div className="stat-sub">{fmt(totalActive)} сомони</div>
        </div>
        <div className="stat-card">
          <div className="stat-accent" style={{background:'var(--red)'}}/>
          <div className="stat-icon" style={{background:'var(--red-bg)'}}><span>🔴</span></div>
          <div className="stat-label">Просрочено</div>
          <div className="stat-value" style={{color:'var(--red)'}}>{overdue.length}</div>
          <div className="stat-sub">{fmt(totalOverdue)} сомони</div>
        </div>
        <div className="stat-card">
          <div className="stat-accent" style={{background:'var(--green)'}}/>
          <div className="stat-icon" style={{background:'var(--green-bg)'}}><span>✅</span></div>
          <div className="stat-label">Погашено</div>
          <div className="stat-value" style={{color:'var(--green)'}}>{paid.length}</div>
          <div className="stat-sub">{fmt(totalPaid)} сомони</div>
        </div>
        <div className="stat-card">
          <div className="stat-accent" style={{background:'var(--amber)'}}/>
          <div className="stat-icon" style={{background:'var(--amber-bg)'}}><span>👥</span></div>
          <div className="stat-label">Клиентов с долгом</div>
          <div className="stat-value" style={{color:'var(--amber)'}}>{clients}</div>
          <div className="stat-sub">уникальных</div>
        </div>
      </div>

      {/* Overdue categories */}
      {overdue.length>0&&(
        <div className="card" style={{marginBottom:20}}>
          <div className="card-header">
            <div><div className="card-title">⚠️ Классификация просрочки</div><div className="card-sub">По срокам задолженности</div></div>
          </div>
          <div className="overdue-grid">
            {overdueCategories.map(cat=>(
              <div key={cat.label} className={`overdue-card ${cat.cls}`}>
                <div className="overdue-card-num">{cat.count}</div>
                <div className="overdue-card-label">{cat.label}</div>
                <div className="overdue-card-sum">{fmt(cat.sum)} сом</div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,marginBottom:20}}>
        {/* Category chart */}
        <div className="card">
          <div className="card-header"><div className="card-title">📊 Долги по категориям</div></div>
          {catEntries.length===0?<div className="empty-state" style={{padding:'24px'}}><div style={{fontSize:13,color:'var(--g400)'}}>Нет данных</div></div>:(
            <div className="chart-wrap">
              {catEntries.map(([cat,val])=>(
                <div key={cat} className="chart-bar-row">
                  <div className="chart-bar-label">{cat}</div>
                  <div className="chart-bar-track"><div className="chart-bar-fill" style={{width:`${Math.round(val/maxCat*100)}%`,background:'var(--primary)'}}/></div>
                  <div className="chart-bar-val">{fmt(val)} сом</div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Recent activity */}
        <div className="card">
          <div className="card-header">
            <div className="card-title">🕐 Последние долги</div>
            <button className="btn btn-sm" onClick={()=>setPage('debts')}>Все →</button>
          </div>
          {loading?<div className="loading-wrap"><div className="spinner"/></div>
          :debts.length===0?<div className="empty-state"><div className="empty-icon">📋</div><div className="empty-title">Долгов нет</div></div>
          :<div style={{padding:'8px 0'}}>
            {debts.slice(0,5).map(d=>{
              const st=getStatus(d);const rem=Number(d.amount)-Number(d.paid_amount??0);
              return <div key={d.id} style={{display:'flex',alignItems:'center',padding:'10px 20px',borderBottom:'1px solid var(--border)'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:13}}>{d.client_name}</div>
                  <div style={{fontSize:11,color:'var(--g400)',marginTop:1}}>{d.phone} · {d.due_date}</div>
                </div>
                <div style={{textAlign:'right',marginLeft:12}}>
                  <div style={{fontWeight:700,fontSize:13,color:rem>0?'var(--red)':'var(--green)'}}>{fmt(rem)} сом</div>
                  <span className={`pill ${statusClass(st)}`} style={{marginTop:3,display:'inline-flex'}}><span className="pill-dot"/>{statusLabel(st)}</span>
                </div>
              </div>;
            })}
          </div>}
        </div>
      </div>

      {/* Critical table */}
      {overdue.length>0&&(
        <div className="card">
          <div className="card-header">
            <div><div className="card-title">🔴 Просроченные долги</div><div className="card-sub">{overdue.length} клиентов требуют внимания</div></div>
            <button className="btn btn-sm" onClick={()=>exportToExcel(overdue,`${business?.name}_просрочка`)}>📥 Excel</button>
          </div>
          <div className="table-wrap"><table>
            <thead><tr><th>Клиент</th><th>Остаток</th><th>Просрочка</th><th>Категория</th><th>Телефон</th><th></th></tr></thead>
            <tbody>{overdue.sort((a,b)=>daysOverdue(b)-daysOverdue(a)).map(d=>{
              const ov=daysOverdue(d);const cat=getOverdueCat(ov);const rem=Number(d.amount)-Number(d.paid_amount??0);
              return <tr key={d.id}>
                <td><div style={{fontWeight:600}}>{d.client_name}</div><div style={{fontSize:11,color:'var(--g400)'}}>{d.category}</div></td>
                <td style={{fontWeight:700,color:'var(--red)'}}>{fmt(rem)} сом</td>
                <td><strong style={{color:'var(--red)'}}>{ov} дн.</strong></td>
                <td>{cat&&<span className={`pill ${cat.cls}`}>{cat.label}</span>}</td>
                <td style={{color:'var(--g500)'}}>{d.phone}</td>
                <td><button className="btn btn-sm btn-green" onClick={()=>setPayDebt(d)}>💰 Оплата</button></td>
              </tr>;
            })}</tbody>
          </table></div>
        </div>
      )}

      {addOpen&&<AddDebtModal business={business} onClose={()=>setAddOpen(false)} onSaved={()=>{load();toast('Долг добавлен ✓');}}/>}
      {payDebt&&<PayModal debt={payDebt} onClose={()=>setPayDebt(null)} onSaved={()=>{load();setPayDebt(null);toast('Оплата записана ✓');}}/>}
    </>
  );
}

// ── Debts Page ──
function DebtsPage() {
  const {business}=useApp();
  const [debts,setDebts]=useState([]);const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');const [fStatus,setFStatus]=useState('');const [sort,setSort]=useState('date_desc');
  const [addOpen,setAddOpen]=useState(false);const [payDebt,setPayDebt]=useState(null);
  async function load(){
    if(!business)return;setLoading(true);
    const {data}=await sb.from('debts').select('*').eq('business_id',business.id).order('created_at',{ascending:false});
    setDebts(data??[]);setLoading(false);
  }
  useEffect(()=>{load();},[business]);
  async function del(d){
    if(!confirm(`Удалить долг "${d.client_name}"?`))return;
    await sb.from('debts').delete().eq('id',d.id);
    toast('Удалено','error');load();
  }
  const list=useMemo(()=>{
    let r=debts.filter(d=>{
      const q=search.toLowerCase();
      return (!q||d.client_name.toLowerCase().includes(q)||d.phone.includes(q))&&(!fStatus||getStatus(d)===fStatus);
    });
    r.sort((a,b)=>{
      if(sort==='date_asc')return new Date(a.date_issued)-new Date(b.date_issued);
      if(sort==='amount_desc')return Number(b.amount)-Number(a.amount);
      if(sort==='overdue')return daysOverdue(b)-daysOverdue(a);
      return new Date(b.created_at)-new Date(a.created_at);
    });
    return r;
  },[debts,search,fStatus,sort]);
  return (
    <>
      <div className="page-header">
        <div><div className="page-title">Все долги</div><div className="page-sub">{list.length} записей</div></div>
        <div className="page-actions">
          <button className="btn" onClick={()=>exportToExcel(list,business?.name||'бизнес')}>📥 Excel</button>
          <button className="btn btn-primary" onClick={()=>setAddOpen(true)}>+ Добавить долг</button>
        </div>
      </div>
      <div className="card">
        <div className="filter-bar">
          <input placeholder="🔍 Поиск по ФИО или телефону..." value={search} onChange={e=>setSearch(e.target.value)}/>
          <select value={fStatus} onChange={e=>setFStatus(e.target.value)}>
            <option value="">Все статусы</option>
            <option value="active">Активный</option>
            <option value="due">Скоро срок</option>
            <option value="overdue">Просрочен</option>
            <option value="paid">Оплачен</option>
          </select>
          <select value={sort} onChange={e=>setSort(e.target.value)}>
            <option value="date_desc">Сначала новые</option>
            <option value="date_asc">Сначала старые</option>
            <option value="amount_desc">По сумме</option>
            <option value="overdue">По просрочке</option>
          </select>
        </div>
        {loading?<div className="loading-wrap"><div className="spinner"/><span>Загрузка...</span></div>
        :list.length===0?<div className="empty-state"><div className="empty-icon">📋</div><div className="empty-title">Долгов не найдено</div><div className="empty-sub">Измените фильтры или добавьте первый долг</div></div>
        :<div className="table-wrap"><table>
          <thead><tr><th>Клиент</th><th>Телефон</th><th>Сумма</th><th>Оплачено</th><th>Остаток</th><th>Срок</th><th>Просрочка</th><th>Статус</th><th></th></tr></thead>
          <tbody>{list.map(d=>{
            const st=getStatus(d);const pa=Number(d.paid_amount??0);const rem=Number(d.amount)-pa;const ov=daysOverdue(d);const cat=getOverdueCat(ov);
            return <tr key={d.id}>
              <td><div style={{fontWeight:600}}>{d.client_name}</div>{d.comment&&<div style={{fontSize:11,color:'var(--g400)'}}>{d.comment}</div>}</td>
              <td style={{color:'var(--g500)'}}>{d.phone}</td>
              <td style={{fontWeight:600}}>{fmt(d.amount)}</td>
              <td style={{color:'var(--g400)'}}>{pa>0?fmt(pa):'—'}</td>
              <td style={{fontWeight:700,color:rem>0?'var(--red)':'var(--g400)'}}>{fmt(rem)}</td>
              <td style={{color:'var(--g500)',fontSize:12}}>{d.due_date}</td>
              <td>{st==='overdue'&&cat?<span className={`pill ${cat.cls}`}>{cat.label}</span>:<span style={{color:'var(--g300)'}}>—</span>}</td>
              <td><span className={`pill ${statusClass(st)}`}><span className="pill-dot"/>{statusLabel(st)}</span></td>
              <td><div className="row-actions">
                {st!=='paid'&&<button className="btn btn-sm btn-green" onClick={()=>setPayDebt(d)}>💰</button>}
                <button className="btn btn-sm btn-danger" onClick={()=>del(d)}>✕</button>
              </div></td>
            </tr>;
          })}</tbody>
        </table></div>}
      </div>
      {addOpen&&<AddDebtModal business={business} onClose={()=>setAddOpen(false)} onSaved={()=>{load();toast('Долг добавлен ✓');}}/>}
      {payDebt&&<PayModal debt={payDebt} onClose={()=>setPayDebt(null)} onSaved={()=>{load();setPayDebt(null);toast('Оплата записана ✓');}}/>}
    </>
  );
}

// ── Clients Page ──
function ClientsPage() {
  const {business}=useApp();
  const [debts,setDebts]=useState([]);const [loading,setLoading]=useState(true);const [search,setSearch]=useState('');
  useEffect(()=>{
    if(!business)return;setLoading(true);
    sb.from('debts').select('*').eq('business_id',business.id).then(({data})=>{setDebts(data??[]);setLoading(false);});
  },[business]);
  const clients=useMemo(()=>{
    const map={};
    debts.forEach(d=>{if(!map[d.phone])map[d.phone]={name:d.client_name,phone:d.phone,debts:[]};map[d.phone].debts.push(d);});
    return Object.values(map).filter(c=>{const q=search.toLowerCase();return !q||c.name.toLowerCase().includes(q)||c.phone.includes(q);})
      .sort((a,b)=>b.debts.some(d=>getStatus(d)==='overdue')-a.debts.some(d=>getStatus(d)==='overdue'));
  },[debts,search]);
  return (
    <>
      <div className="page-header"><div><div className="page-title">Клиенты</div><div className="page-sub">{clients.length} клиентов в базе</div></div></div>
      <div className="card">
        <div className="filter-bar"><input placeholder="🔍 Поиск по имени или телефону..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
        {loading?<div className="loading-wrap"><div className="spinner"/></div>
        :clients.length===0?<div className="empty-state"><div className="empty-icon">👥</div><div className="empty-title">Клиентов нет</div><div className="empty-sub">Они появятся когда добавите долги</div></div>
        :<div className="table-wrap"><table>
          <thead><tr><th>Клиент</th><th>Телефон</th><th>Долгов</th><th>Активная сумма</th><th>Оплачено</th><th>Макс. просрочка</th><th>Статус</th></tr></thead>
          <tbody>{clients.map(c=>{
            const active=c.debts.filter(d=>getStatus(d)!=='paid');
            const paidD=c.debts.filter(d=>getStatus(d)==='paid');
            const actSum=active.reduce((s,d)=>s+Number(d.amount)-Number(d.paid_amount??0),0);
            const paidSum=paidD.reduce((s,d)=>s+Number(d.amount),0);
            const hasOv=active.some(d=>getStatus(d)==='overdue');
            const maxOv=Math.max(0,...active.filter(d=>getStatus(d)==='overdue').map(d=>daysOverdue(d)));
            const cat=getOverdueCat(maxOv);
            const init=c.name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
            return <tr key={c.phone}>
              <td><div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:36,height:36,borderRadius:10,background:'linear-gradient(135deg,#EFF6FF,#F5F3FF)',color:'var(--primary)',fontSize:13,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,border:'1px solid var(--border)'}}>{init}</div>
                <div><div style={{fontWeight:600}}>{c.name}</div></div>
              </div></td>
              <td style={{color:'var(--g500)'}}>{c.phone}</td>
              <td style={{fontWeight:600}}>{c.debts.length}</td>
              <td style={{fontWeight:700,color:actSum>0?'var(--red)':'var(--g400)'}}>{fmt(actSum)} сом</td>
              <td style={{color:'var(--green)',fontWeight:600}}>{fmt(paidSum)} сом</td>
              <td>{maxOv>0&&cat?<span className={`pill ${cat.cls}`}>{maxOv} дн.</span>:<span style={{color:'var(--g300)'}}>—</span>}</td>
              <td><span className={`pill ${hasOv?'pill-overdue':active.length?'pill-active':'pill-paid'}`}><span className="pill-dot"/>{hasOv?'Просрочка':active.length?'Активный':'Чистый'}</span></td>
            </tr>;
          })}</tbody>
        </table></div>}
      </div>
    </>
  );
}

// ── Settings ──
function SettingsPage() {
  const {business,setBusiness,session}=useApp();
  const [name,setName]=useState('');const [type,setType]=useState('');const [saving,setSaving]=useState(false);
  const types=['Аптека','Продуктовый магазин','Строительный магазин','Магазин одежды','Ресторан / кафе','Другое'];
  useEffect(()=>{if(business){setName(business.name);setType(business.type);};},[business]);
  async function save(e){
    e.preventDefault();setSaving(true);
    const {data}=await sb.from('businesses').update({name,type}).eq('id',business.id).select().single();
    if(data){setBusiness(data);toast('Настройки сохранены ✓');}
    setSaving(false);
  }
  return (
    <>
      <div className="page-header"><div><div className="page-title">Настройки</div><div className="page-sub">Данные вашего бизнеса</div></div></div>
      <div className="card" style={{maxWidth:500}}>
        <div className="card-header"><span className="card-title">Профиль бизнеса</span></div>
        <form onSubmit={save} style={{padding:24}}>
          <label>Email аккаунта</label>
          <input value={session?.user?.email??''} disabled/>
          <label>Название бизнеса</label>
          <input value={name} onChange={e=>setName(e.target.value)} required/>
          <label>Тип бизнеса</label>
          <select value={type} onChange={e=>setType(e.target.value)}>{types.map(t=><option key={t}>{t}</option>)}</select>
          <button className="btn btn-primary" type="submit" style={{marginTop:24}} disabled={saving}>
            {saving?'Сохраняем...':'Сохранить изменения'}
          </button>
        </form>
      </div>
    </>
  );
}

// ── Sidebar ──
function Sidebar({page,setPage,overdueCount}) {
  const {session,business}=useApp();
  const email=session?.user?.email??'';
  const initials=(business?.name??email).slice(0,2).toUpperCase();
  const nav=[
    {id:'dashboard',icon:'📊',label:'Дашборд'},
    {id:'debts',icon:'📋',label:'Долги'},
    {id:'clients',icon:'👥',label:'Клиенты'},
    {id:'settings',icon:'⚙️',label:'Настройки'},
  ];
  return (
    <aside className="sidebar">
      <div className="sidebar-logo">
        <div className="logo-wrap">
          <LogoIcon size={42}/>
          <div>
            <div className="logo-name">Феҳрист</div>
            <div className="logo-tagline">Учёт задолженностей</div>
          </div>
        </div>
      </div>
      <nav className="nav">
        <div className="nav-section">Навигация</div>
        {nav.map(n=>(
          <button key={n.id} className={`nav-item${page===n.id?' active':''}`} onClick={()=>setPage(n.id)}>
            <div className="nav-icon-wrap">{n.icon}</div>
            {n.label}
            {n.id==='debts'&&overdueCount>0&&<span className="nav-badge">{overdueCount}</span>}
          </button>
        ))}
      </nav>
      <div className="sidebar-footer">
        <div className="user-row">
          <div className="user-avatar">{initials}</div>
          <div style={{flex:1,minWidth:0}}>
            <div className="user-name">{business?.name??'Бизнес'}</div>
            <div className="user-email">{email}</div>
          </div>
          <button className="logout-btn" onClick={()=>sb.auth.signOut()} title="Выйти">↩</button>
        </div>
      </div>
    </aside>
  );
}

// ── App ──
const PAGES={dashboard:Dashboard,debts:DebtsPage,clients:ClientsPage,settings:SettingsPage};
function App() {
  const [session,setSession]=useState(undefined);
  const [business,setBusiness]=useState(null);
  const [page,setPage]=useState('dashboard');
  const [toastState,setToast]=useState(null);
  const [overdueCount,setOverdueCount]=useState(0);
  _toast=setToast;

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>setSession(session));
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>setSession(s));
    return ()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if(!session){setBusiness(null);return;}
    sb.from('businesses').select('*').eq('owner_id',session.user.id).single().then(({data})=>setBusiness(data));
  },[session]);

  useEffect(()=>{
    if(!business)return;
    sb.from('debts').select('status,due_date').eq('business_id',business.id).neq('status','paid')
      .then(({data})=>{
        const ov=(data??[]).filter(d=>getStatus(d)==='overdue').length;
        setOverdueCount(ov);
      });
  },[business]);

  useEffect(()=>{
    if(!toastState)return;
    const t=setTimeout(()=>setToast(null),3000);
    return ()=>clearTimeout(t);
  },[toastState]);

  if(session===undefined)return <div className="loading-wrap" style={{minHeight:'100vh'}}><div className="spinner"/></div>;
  if(!session)return <AuthPage/>;
  const Page=PAGES[page]??Dashboard;
  return (
    <AppCtx.Provider value={{session,business,setBusiness,setPage}}>
      <div className="layout">
        <Sidebar page={page} setPage={setPage} overdueCount={overdueCount}/>
        <div className="main"><div className="main-inner"><Page/></div></div>
      </div>
      {toastState&&(
        <div key={toastState.id} className={`toast toast-${toastState.type}`}>
          {toastState.type==='success'?'✅':'❌'} {toastState.msg}
        </div>
      )}
    </AppCtx.Provider>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
